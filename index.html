<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maliq Oka | 3D Sci-Fi Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --cyan: #00f5ff;
            --purple: #b400ff;
            --bg: #020210;
            --white: #e8e8ff;
            --panel-bg: rgba(2, 2, 16, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .pointer-events { pointer-events: auto; }

        /* HUD */
        #hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        #status-display {
            color: var(--cyan);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan);
        }

        #hud-bottom {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .dot-nav {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 1px solid var(--cyan);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active {
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
        }

        /* Panels */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        #intro-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
        }

        #intro-overlay h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan);
            margin-bottom: 10px;
            letter-spacing: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 15px 40px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--cyan);
            color: var(--bg);
            box-shadow: 0 0 20px var(--cyan);
        }

        #about-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 600px;
            display: none;
        }

        #about-panel h2 {
            color: var(--cyan);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        /* Project UI */
        #project-info {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            text-align: center;
            display: none;
        }

        #project-controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            transform: translateY(-50%);
            display: none;
        }

        /* Contact Form */
        #hire-form-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            display: none;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--cyan); font-size: 0.7rem; margin-bottom: 8px; letter-spacing: 2px; }
        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 245, 255, 0.3);
            color: white;
            padding: 12px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 245, 255, 0.2); }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--panel-bg);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-size: 0.8rem;
            transform: translateY(100px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.show { transform: translateY(0); }

        @media (max-width: 768px) {
            #project-controls { padding: 0 10px; }
            .btn { padding: 12px 25px; }
        }
    </style>
</head>
<body>
    <div id="scene-container"></div>
    <div id="toast">SYSTEM NOTIFICATION</div>

    <div id="ui-layer">
        <div id="hud-top">
            <div id="status-display">SYS_LINK: ESTABLISHING...</div>
            <button id="back-to-orbit-btn" class="btn pointer-events" style="display:none">BACK_TO_ORBIT</button>
        </div>

        <div id="intro-overlay">
            <h1>MALIQ OKA</h1>
            <p style="letter-spacing: 8px;">FULL STACK DEVELOPER</p>
            <button id="enter-btn" class="btn pointer-events">INITIALIZE_SCAN</button>
        </div>

        <div id="about-panel" class="glass-panel">
            <h2>IDENTITY_LOG</h2>
            <p id="hero-bio" style="font-size: 0.9rem; line-height: 1.8; margin-bottom: 20px;"></p>
            <div id="skills-title" style="color:var(--cyan); font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 2px;">NEURAL_SKILLS_NET:</div>
            <div style="font-size: 0.7rem; color: #888;">[ VISUALIZING IN 3D SPACE ]</div>
        </div>

        <div id="project-controls">
            <button id="prev-district" class="btn pointer-events">&lt; PREV</button>
            <button id="next-district" class="btn pointer-events">NEXT &gt;</button>
        </div>

        <div id="project-info" class="glass-panel">
            <h3 id="p-name" style="color: var(--cyan); margin-bottom: 5px;"></h3>
            <p id="p-url" style="color: var(--purple); font-size: 0.8rem; margin-bottom: 15px;"></p>
            <a id="p-link" href="#" target="_blank" class="btn pointer-events" style="display:inline-block; padding: 10px 20px; font-size: 0.7rem;">OPEN_CHANNEL</a>
        </div>

        <div id="hire-form-container">
            <div class="glass-panel">
                <h2 style="color: var(--purple); margin-bottom: 25px; text-shadow: 0 0 10px var(--purple);">ESTABLISH_CONNECTION</h2>
                <form id="contact-form">
                    <div class="input-group">
                        <label>IDENTIFIER</label>
                        <input type="text" id="fn" placeholder="YOUR NAME" required>
                    </div>
                    <div class="input-group">
                        <label>COMM_CHANNEL</label>
                        <input type="email" id="fe" placeholder="EMAIL ADDRESS" required>
                    </div>
                    <div class="input-group">
                        <label>TRANSMISSION</label>
                        <textarea id="fm" rows="4" placeholder="MESSAGE CONTENT..." required></textarea>
                    </div>
                    <button type="submit" id="sbtn" class="btn" style="width:100%">SEND_SIGNAL</button>
                </form>
            </div>
        </div>

        <div id="hud-bottom">
            <div class="dot-nav">
                <div class="dot active" data-chapter="0"></div>
                <div class="dot" data-chapter="1"></div>
                <div class="dot" data-chapter="2"></div>
                <div class="dot" data-chapter="3"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const PORTFOLIO = {
            name: "Maliq Oka",
            bio: "Over 40+ verified projects. Specialized in WooCommerce ecosystems and high-performance web experiences. Based in Berlin.",
            skills: ["WordPress", "WooCommerce", "PHP", "MySQL", "JavaScript", "React", "Three.js", "GSAP", "Tailwind", "UI/UX"],
            projects: [
                {n:"Above All Eco Clean", u:"aboveallecoclean.hostpapadesign.com", tags:["staging"]},
                {n:"Ahtran Scripts", u:"ahtranscripts.com", tags:["corporate"]},
                {n:"AllProbe Environmental", u:"allprobeenvironmental.com", tags:["corporate"]},
                {n:"ARC Wealth Options", u:"arcwealthoptions.ca", tags:["corporate"]},
                {n:"Atelier East Design", u:"ateliereastdesign.com", tags:["corporate"]},
                {n:"Ausilon", u:"ausilon.hostpapadesign.com", tags:["staging"]},
                {n:"Bruce Campbell Author", u:"brucecampbellauthor.com", tags:["corporate"]},
                {n:"CATAPULT", u:"catapultsearch.com", tags:["corporate"]},
                {n:"Dare to Rise", u:"daretorisefoundation.org", tags:["nonprofit"]},
                {n:"Delisle Dental", u:"delisledentalsk.ca", tags:["corporate"]},
                {n:"Doctors Hub", u:"doctorshub.ca", tags:["corporate"]},
                {n:"Ecotech Saunas", u:"ecotechsaunas.com", tags:["woo"]},
                {n:"Elevate Strengths", u:"elevatestrengths.com", tags:["corporate"]},
                {n:"Freedom Prosthetics", u:"freedomprosthetics.ca", tags:["corporate"]},
                {n:"Gymnastics Mississauga", u:"gymmississauga.hostpapadesign.com", tags:["staging"]},
                {n:"Hampden Diner PA", u:"hampdendinerpa.com", tags:["woo"]},
                {n:"Hunter Valley Cheese", u:"huntervalleycheese.hostpapadesign.com", tags:["woo"]},
                {n:"Jayr Memorials", u:"jayrmemorials.com", tags:["woo"]},
                {n:"Larca Machining", u:"larcamachining.hostpapadesign.com", tags:["corporate"]},
                {n:"Legaltech LLC", u:"legaltech-llc.com", tags:["corporate"]},
                {n:"Les Treize Inc.", u:"lestreizeinc.org", tags:["nonprofit"]},
                {n:"Lost Time Mgmt", u:"losttimemanagement.com", tags:["corporate"]},
                {n:"Michael Kent Author", u:"kentwriter.com", tags:["corporate"]},
                {n:"Sew Helpful", u:"sewhelpful.hostpapadesign.com", tags:["woo"]},
                {n:"North Shore Repair", u:"nsrestore.ca", tags:["corporate"]},
                {n:"Palazzo Interiors", u:"palazzointeriors.com", tags:["corporate"]},
                {n:"PBG Canada", u:"pbgcanada.ca", tags:["corporate"]},
                {n:"Perinatal Psychotherapy", u:"perinatalpsychotherapy.ca", tags:["corporate"]},
                {n:"Potash Global", u:"potash.eu", tags:["corporate"]},
                {n:"Premier Fluid Systems", u:"pfspumps.com", tags:["corporate"]},
                {n:"Re-Lit", u:"re-lit.com.au", tags:["woo"]},
                {n:"Roswell Community", u:"roswell.hostpapadesign.com", tags:["nonprofit"]},
                {n:"Sports Numbers", u:"sportsnumbers.ca", tags:["woo"]},
                {n:"Sunset Point", u:"sunsetpoint.ca", tags:["corporate"]},
                {n:"Unickel Insurance", u:"unickelinsurance.com", tags:["corporate"]},
                {n:"Wilmington Head Start", u:"wilmheadstart.org", tags:["nonprofit"]},
                {n:"Zoe's Bakery", u:"zoesbakery.hostpapadesign.com", tags:["staging"]},
                {n:"Bunker Hill", u:"bunkerhill.hostpapadesign.com", tags:["staging"]},
                {n:"Canyon Creek", u:"canyoncreek.hostpapadesign.com", tags:["staging"]},
                {n:"Eagle Point", u:"eaglepoint.hostpapadesign.com", tags:["staging"]},
                {n:"Falcon Ridge", u:"falconridge.hostpapadesign.com", tags:["staging"]}
            ]
        };

        // --- GLOBAL VARS ---
        let scene, camera, renderer, starField, planet, cityGroup, androids = [];
        let warpFactor = 1.0;
        let currentChapter = 0, lookAtTarget = new THREE.Vector3(0, 0, -800), mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster(), intersects = [];
        let skillNetGroup, projectDistricts = [];

        // --- INIT WORLD ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(0, 0, 3000);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('scene-container').appendChild(renderer.domElement);

            // Lights
            scene.add(new THREE.AmbientLight(0x222244, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 5, 10);
            scene.add(sun);
            const point = new THREE.PointLight(0x00f5ff, 2, 1000);
            point.position.set(0, 100, 500);
            scene.add(point);

            initStars();
            initPlanet();
            initCity();
            initAndroids();
            initSkillNet();
            initProjectDistricts();

            window.addEventListener('resize', onResize);
            document.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            document.addEventListener('click', onClick);

            animate();
            startIntro();

            document.getElementById('hero-bio').innerText = PORTFOLIO.bio;
        }

        function initStars() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(15000 * 3);
            for (let i = 0; i < 45000; i++) pos[i] = (Math.random() - 0.5) * 10000;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            starField = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8 }));
            scene.add(starField);
        }

        function initPlanet() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#050515'; ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = '#103050'; for(let i=0; i<15; i++) { ctx.beginPath(); ctx.arc(Math.random()*512, Math.random()*512, 30+Math.random()*100, 0, Math.PI*2); ctx.fill(); }
            ctx.fillStyle = '#ffaa00'; for(let i=0; i<800; i++) ctx.fillRect(Math.random()*512, Math.random()*512, 1, 1);

            planet = new THREE.Mesh(new THREE.SphereGeometry(300, 64, 64), new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(canvas), shininess: 5 }));
            planet.position.set(0, 0, -800);
            scene.add(planet);

            const atmo = new THREE.Mesh(new THREE.SphereGeometry(315, 64, 64), new THREE.MeshPhongMaterial({ color: 0x00f5ff, transparent: true, opacity: 0.1, side: THREE.BackSide }));
            atmo.position.copy(planet.position);
            scene.add(atmo);
        }

        function initCity() {
            cityGroup = new THREE.Group();
            cityGroup.visible = false;
            const grid = new THREE.GridHelper(5000, 80, 0x00f5ff, 0x001111);
            grid.position.y = -200;
            cityGroup.add(grid);

            const mat = new THREE.MeshPhongMaterial({ color: 0x050510, emissive: 0x001111 });
            const box = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 350; i++) {
                const x = (Math.random() - 0.5) * 8000, z = (Math.random() - 0.5) * 8000;
                if (Math.abs(x) < 800 && Math.abs(z) < 800) continue;
                const h = 100 + Math.random() * 900, w = 40 + Math.random() * 120;
                const m = new THREE.Mesh(box, mat); m.scale.set(w, h, w); m.position.set(x, h/2 - 200, z);
                cityGroup.add(m);
            }
            scene.add(cityGroup);
            scene.fog = new THREE.Fog(0x020210, 500, 5000);
        }

        function initAndroids() {
            const mat = new THREE.MeshPhongMaterial({ color: 0x222222, emissive: 0x002222 });
            for (let i = 0; i < 15; i++) {
                const g = new THREE.Group();
                const head = new THREE.Mesh(new THREE.SphereGeometry(2, 12, 12), mat); head.position.y = 12;
                const body = new THREE.Mesh(new THREE.CylinderGeometry(2, 3, 8, 12), mat); body.position.y = 6;
                g.add(head); g.add(body);

                // Limbs
                const armGeo = new THREE.BoxGeometry(1, 6, 1);
                const lArm = new THREE.Mesh(armGeo, mat); lArm.position.set(-3.5, 6, 0); lArm.rotation.z = 0.2;
                const rArm = new THREE.Mesh(armGeo, mat); rArm.position.set(3.5, 6, 0); rArm.rotation.z = -0.2;
                const lLeg = new THREE.Mesh(armGeo, mat); lLeg.position.set(-1.5, -1, 0);
                const rLeg = new THREE.Mesh(armGeo, mat); rLeg.position.set(1.5, -1, 0);
                g.add(lArm, rArm, lLeg, rLeg);

                // Flying positions
                g.position.set((Math.random()-0.5)*2500, (Math.random()-0.5)*1200, (Math.random()-0.5)*4000);
                scene.add(g);
                androids.push({ m: g, b: g.position.clone(), s: Math.random()*2, vx: (Math.random()-0.5)*2 });
            }
        }

        function initSkillNet() {
            skillNetGroup = new THREE.Group();
            skillNetGroup.position.set(0, 0, -500);
            skillNetGroup.visible = false;

            const nodes = [];
            const skillMat = new THREE.MeshPhongMaterial({ color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: 0.5 });
            const hexGeo = new THREE.CylinderGeometry(15, 15, 2, 6);
            hexGeo.rotateX(Math.PI/2);

            PORTFOLIO.skills.forEach((skill, i) => {
                const node = new THREE.Group();
                const hex = new THREE.Mesh(hexGeo, skillMat);
                node.add(hex);

                // Label
                const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d'); ctx.font = 'bold 24px Space Mono'; ctx.fillStyle = '#00f5ff'; ctx.textAlign = 'center'; ctx.fillText(skill, 128, 40);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
                sprite.scale.set(60, 15, 1); sprite.position.y = 25;
                node.add(sprite);

                node.position.set((Math.random()-0.5)*400, (Math.random()-0.5)*300, (Math.random()-0.5)*200);
                skillNetGroup.add(node);
                nodes.push(node);
            });

            // Lines
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00f5ff, transparent: true, opacity: 0.3 });
            for(let i=0; i<nodes.length; i++) {
                for(let j=i+1; j<nodes.length; j++) {
                    if (nodes[i].position.distanceTo(nodes[j].position) < 200) {
                        const geo = new THREE.BufferGeometry().setFromPoints([nodes[i].position, nodes[j].position]);
                        skillNetGroup.add(new THREE.Line(geo, lineMat));
                    }
                }
            }
            scene.add(skillNetGroup);
        }

        function initProjectDistricts() {
            const categories = ["woo", "corporate", "staging", "nonprofit"];
            categories.forEach((cat, idx) => {
                const district = new THREE.Group();
                district.position.set(idx * 2000, 0, -2000);
                district.visible = false;

                // Pad
                const pad = new THREE.Mesh(new THREE.CylinderGeometry(400, 420, 20, 32), new THREE.MeshPhongMaterial({ color: 0x001122, emissive: 0x00f5ff, emissiveIntensity: 0.1, transparent: true, opacity: 0.8 }));
                pad.position.y = -190;
                district.add(pad);

                const catProjects = PORTFOLIO.projects.filter(p => p.tags.includes(cat));
                catProjects.forEach((proj, pi) => {
                    const angle = (pi / catProjects.length) * Math.PI * 2;
                    const kiosk = new THREE.Group();
                    kiosk.position.set(Math.cos(angle)*320, -100, Math.sin(angle)*320);
                    kiosk.lookAt(0, -100, 0);

                    const screen = new THREE.Mesh(new THREE.BoxGeometry(80, 50, 4), new THREE.MeshPhongMaterial({ color: 0x001122, emissive: 0x00f5ff, emissiveIntensity: 0.2 }));
                    kiosk.add(screen);

                    // Name Label
                    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
                    const ctx = canvas.getContext('2d'); ctx.fillStyle = '#00f5ff'; ctx.font = 'bold 32px Space Mono'; ctx.textAlign = 'center';
                    // Word wrap
                    const words = proj.n.split(' '); let line = '', y = 60;
                    for(let w of words) {
                        let test = line + w + ' ';
                        if (ctx.measureText(test).width > 480) { ctx.fillText(line, 256, y); line = w + ' '; y += 40; }
                        else line = test;
                    }
                    ctx.fillText(line, 256, y);
                    const tex = new THREE.CanvasTexture(canvas);
                    const label = new THREE.Mesh(new THREE.PlaneGeometry(70, 20), new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide }));
                    label.position.z = 3;
                    kiosk.add(label);

                    kiosk.userData = { project: proj };
                    district.add(kiosk);
                    projectDistricts.push(kiosk);
                });
                scene.add(district);
                district.userData = { cat };
            });
        }

        // --- ANIMATION & LOGIC ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (planet) planet.rotation.y += 0.001;
            if (starField) {
                starField.rotation.y += 0.0002;
                starField.position.z += warpFactor * 5;
                if (starField.position.z > 5000) starField.position.z = -5000;
                starField.scale.z = warpFactor > 1 ? warpFactor * 0.5 : 1;
            }

            androids.forEach(a => {
                a.m.position.y = a.b.y + Math.sin(time + a.s) * 20;
                a.m.position.x += a.vx;
                if (Math.abs(a.m.position.x) > 2000) a.m.position.x = -a.m.position.x;
                a.m.rotation.y += 0.01;
            });

            if (skillNetGroup && skillNetGroup.visible) {
                skillNetGroup.rotation.y = Math.sin(time * 0.2) * 0.2;
                skillNetGroup.rotation.x = Math.cos(time * 0.2) * 0.1;
            }

            camera.lookAt(lookAtTarget);
            // Tilt
            camera.rotation.y += mouse.x * 0.03;
            camera.rotation.x -= mouse.y * 0.03;

            renderer.render(scene, camera);
        }

        function startIntro() {
            warpFactor = 40;
            gsap.to(this, { warpFactor: 1, duration: 3, ease: "power2.in" });
            gsap.to(camera, { fov: 60, duration: 3, ease: "power2.inOut", onUpdate: () => camera.updateProjectionMatrix() });
            camera.fov = 100; camera.updateProjectionMatrix();

            gsap.to(camera.position, { z: 800, duration: 3, ease: "power2.inOut", onComplete: () => {
                gsap.to('#intro-overlay', { opacity: 1, duration: 1 });
            }});
            showToast("NEURAL_LINK_ACTIVE");
            document.getElementById('status-display').innerText = "SYS_LINK: CONNECTED";
        }

        function goToChapter(n) {
            currentChapter = n;
            const targets = [
                { p: { x: 0, y: 0, z: 800 }, l: { x: 0, y: 0, z: -800 } },
                { p: { x: 0, y: 150, z: 400 }, l: { x: 0, y: 0, z: -500 } },
                { p: { x: 0, y: 500, z: -1200 }, l: { x: 0, y: -100, z: -2000 } },
                { p: { x: 0, y: 300, z: 4600 }, l: { x: 0, y: -100, z: 4000 } }
            ];
            const t = targets[n];
            gsap.to(camera.position, { x: t.p.x, y: t.p.y, z: t.p.z, duration: 2, ease: "power2.inOut" });
            gsap.to(lookAtTarget, { x: t.l.x, y: t.l.y, z: t.l.z, duration: 2, ease: "power2.inOut" });

            // UI
            gsap.to(['#intro-overlay', '#about-panel', '#project-controls', '#project-info', '#hire-form-container'], { opacity: 0, display: 'none', duration: 0.5 });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === n));

            setTimeout(() => {
                if(n===0) gsap.to('#intro-overlay', { opacity: 1, display: 'block' });
                if(n===1) { gsap.to('#about-panel', { opacity: 1, display: 'block' }); skillNetGroup.visible = true; } else { skillNetGroup.visible = false; }
                if(n===2) { gsap.to('#project-controls', { opacity: 1, display: 'flex' }); updateDistrictVisibility(); }
                if(n===3) gsap.to('#hire-form-container', { opacity: 1, display: 'block' });

                document.getElementById('back-to-orbit-btn').style.display = n === 0 ? 'none' : 'block';
                cityGroup.visible = n > 0;
            }, 600);

            document.getElementById('status-display').innerText = `LOC: SECTOR_${n}`;
        }

        let currentCatIdx = 0;
        function updateDistrictVisibility() {
            const cats = ["woo", "corporate", "staging", "nonprofit"];
            scene.children.forEach(child => {
                if (child.userData && child.userData.cat) {
                    child.visible = child.userData.cat === cats[currentCatIdx];
                }
            });
            const tx = currentCatIdx * 2000;
            gsap.to(camera.position, { x: tx, duration: 1.5, ease: "power2.inOut" });
            gsap.to(lookAtTarget, { x: tx, duration: 1.5, ease: "power2.inOut" });
            document.getElementById('status-display').innerText = `LOC: DISTRICT_${cats[currentCatIdx].toUpperCase()}`;
        }

        function onClick(e) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const kiosk = intersects.find(i => i.object.parent && i.object.parent.userData && i.object.parent.userData.project);
            if (kiosk) {
                const p = kiosk.object.parent.userData.project;
                document.getElementById('p-name').innerText = p.n;
                document.getElementById('p-url').innerText = p.u;
                document.getElementById('p-link').href = "https://" + p.u;
                gsap.to('#project-info', { display: 'block', opacity: 1, duration: 0.5 });
            } else {
                gsap.to('#project-info', { opacity: 0, duration: 0.3, onComplete: () => document.getElementById('project-info').style.display = 'none' });
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- EVENTS ---
        document.getElementById('enter-btn').onclick = () => goToChapter(1);
        document.getElementById('back-to-orbit-btn').onclick = () => goToChapter(0);
        document.querySelectorAll('.dot').forEach((d, i) => d.onclick = () => goToChapter(i));
        document.getElementById('next-district').onclick = () => { currentCatIdx = (currentCatIdx+1)%4; updateDistrictVisibility(); };
        document.getElementById('prev-district').onclick = () => { currentCatIdx = (currentCatIdx+3)%4; updateDistrictVisibility(); };

        document.getElementById('contact-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sbtn'); btn.innerText = "SENDING..."; btn.disabled = true;
            const fd = new FormData();
            fd.append('access_key', '8ced933c-0914-46d5-aabc-a559e61de0b0');
            fd.append('name', document.getElementById('fn').value);
            fd.append('email', document.getElementById('fe').value);
            fd.append('message', document.getElementById('fm').value);
            try {
                const r = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: fd });
                if(r.ok) { showToast("TRANSMISSION_SUCCESS"); document.getElementById('contact-form').reset(); }
                else showToast("TRANSMISSION_FAILED");
            } catch(err) { showToast("COMMS_ERROR"); }
            finally { btn.innerText = "SEND_SIGNAL"; btn.disabled = false; }
        };

        init();
    </script>
</body>
</html>

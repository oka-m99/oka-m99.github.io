        function createStarfield() {
            const starCount = 10000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 2000;
                positions[i+1] = (Math.random() - 0.5) * 2000;
                positions[i+2] = (Math.random() - 0.5) * 2000;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true });
            starfield = new THREE.Points(geometry, material);
            scene.add(starfield);
        }

        function createPlanet() {
            // Procedural planet texture
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');

            // Background
            context.fillStyle = '#050510';
            context.fillRect(0, 0, 512, 512);

            // Craters/Details
            for(let i=0; i<200; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const radius = Math.random() * 3;
                context.beginPath();
                context.arc(x, y, radius, 0, Math.PI * 2);
                context.fillStyle = Math.random() > 0.5 ? '#1a1a3a' : '#00f5ff22';
                context.fill();
            }

            // Energy grid (city lights)
            context.strokeStyle = '#00f5ff44';
            context.lineWidth = 0.5;
            for(let i=0; i<512; i+=32) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 512); context.stroke();
                context.beginPath(); context.moveTo(0, i); context.lineTo(512, i); context.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            const geometry = new THREE.SphereGeometry(100, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                map: texture,
                shininess: 10,
                bumpScale: 1,
                transparent: true
            });
            planet = new THREE.Mesh(geometry, material);
            planet.position.set(0, 0, -200);
            scene.add(planet);

            // Atmosphere

                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
            atmosphere.position.copy(planet.position);
            scene.add(atmosphere);

            // Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 3, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x111122));
        }

        // --- CHAPTER 1: ABOUT & CITY ---
        class HolographicPanel {
            constructor(title, text, position) {
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');

                // Border/Background
                ctx.fillStyle = 'rgba(0, 245, 255, 0.05)';
                ctx.fillRect(0, 0, 1024, 512);
                ctx.strokeStyle = '#00f5ff';
                ctx.lineWidth = 10;
                ctx.strokeRect(0, 0, 1024, 512);

                // Text
                ctx.fillStyle = '#00f5ff';
                ctx.font = 'bold 60px "Space Mono"';
                ctx.fillText(title.toUpperCase(), 50, 100);

                ctx.fillStyle = '#e8e8ff';
                ctx.font = '32px "Space Mono"';
                this.wrapText(ctx, text, 50, 180, 924, 45);

                const texture = new THREE.CanvasTexture(canvas);
                const geometry = new THREE.PlaneGeometry(100, 50);
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0, side: THREE.DoubleSide });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.copy(position);
                scene.add(this.mesh);

                gsap.to(material, { opacity: 0.9, duration: 2 });
            }

            wrapText(context, text, x, y, maxWidth, lineHeight) {
                const words = text.split(' ');
                let line = '';
                for (let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    let metrics = context.measureText(testLine);
                    let testWidth = metrics.width;
                    if (testWidth > maxWidth && n > 0) {
                        context.fillText(line, x, y);
                        line = words[n] + ' ';
                        y += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                context.fillText(line, x, y);
            }
        }

            currentDistrict = (currentDistrict + dir + projectGroups.length) % projectGroups.length;
            gsap.to(camera.position, {
                x: currentDistrict * 400,
                duration: 1.5,
                ease: "power2.inOut"
            });
        }

        function onProjectClick(event) {
            if(currentChapter !== 2) return;
            raycaster.setFromCamera(targetMouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            const card = intersects.find(i => i.object.userData.url);
            if(card) {
                gsap.to(card.object.scale, { x: 1.2, y: 1.2, duration: 0.3, yoyo: true, repeat: 1 });
                setTimeout(() => window.open(card.object.userData.url, '_blank'), 600);
            }
        }

        function initChapter1() {
            // City Hub
            cityHub = new THREE.Group();
            const gridHelper = new THREE.GridHelper(1000, 50, 0x00f5ff, 0x00f5ff);
            gridHelper.position.y = -100;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.2;
            cityHub.add(gridHelper);

            // Floating structures
            for(let i=0; i<50; i++) {
                const h = Math.random() * 200 + 50;
                const geo = new THREE.BoxGeometry(20, h, 20);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00f5ff, wireframe: true, transparent: true, opacity: 0.1 });
                const building = new THREE.Mesh(geo, mat);
                building.position.set((Math.random()-0.5)*1000, h/2 - 100, (Math.random()-0.5)*1000);
                cityHub.add(building);
            }
            scene.add(cityHub);

            // About Panels
            holographicPanels.push(new HolographicPanel("About Maliq", personalData.bio, new THREE.Vector3(-60, 20, -300)));

            // Skills Neural Net
            neuralNet = new THREE.Group();
            const nodes = [];
            personalData.skills.forEach((skill, i) => {
                const angle = (i / personalData.skills.length) * Math.PI * 2;
                const radius = 60;
                const x = Math.cos(angle) * radius + 80;
                const y = Math.sin(angle) * radius + 20;
                const z = -300;

                const hexGeo = new THREE.CircleGeometry(8, 6);
                const hexMat = new THREE.MeshBasicMaterial({ color: 0x00f5ff, wireframe: true, transparent: true, opacity: 0.8 });
                const hex = new THREE.Mesh(hexGeo, hexMat);
                hex.position.set(x, y, z);
                nodes.push(new THREE.Vector3(x, y, z));

                // Skill Text
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#00f5ff';
                ctx.font = '24px "Space Mono"';
                ctx.textAlign = 'center';
                ctx.fillText(skill.name, 128, 40);
                const txtTex = new THREE.CanvasTexture(canvas);
                const txtGeo = new THREE.PlaneGeometry(20, 5);
                const txtMat = new THREE.MeshBasicMaterial({ map: txtTex, transparent: true });
                const txtMesh = new THREE.Mesh(txtGeo, txtMat);
                txtMesh.position.set(x, y - 12, z);

                neuralNet.add(hex, txtMesh);
            });

            // Neural connections
            const lineGeo = new THREE.BufferGeometry();
            const linePoints = [];
            for(let i=0; i<nodes.length; i++) {
                for(let j=i+1; j<nodes.length; j++) {
                    linePoints.push(nodes[i].x, nodes[i].y, nodes[i].z);
                    linePoints.push(nodes[j].x, nodes[j].y, nodes[j].z);
                }
            }
            lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePoints, 3));
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00f5ff, transparent: true, opacity: 0.2 });
            const lines = new THREE.LineSegments(lineGeo, lineMat);
            neuralNet.add(lines);

            scene.add(neuralNet);

            // Transition Camera to view panels
            gsap.to(camera.position, { z: -200, duration: 2, ease: "power2.out" });
        }

        initCore();
        initIntro();

        function animate() {
            requestAnimationFrame(animate);
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;

            if(currentChapter === 0) {
                camera.position.x += (mouse.x * 20 - camera.position.x) * 0.01;
                camera.position.y += (-mouse.y * 20 - camera.position.y) * 0.01;
                camera.lookAt(planet.position);
                planet.rotation.y += 0.001;
                starfield.rotation.y += 0.0002;
                robots.forEach(r => {
                    r.mesh.position.z += r.speed;
                    if(r.mesh.position.z > 500) r.mesh.position.z = -500;
                });
            } else if(currentChapter === 1) {
                camera.position.x += (mouse.x * 50 - camera.position.x) * 0.01;
                camera.position.y += (-mouse.y * 50 - camera.position.y) * 0.01;
                camera.lookAt(0, 0, -500);
            } else if(currentChapter === 2) {
                camera.position.y += (-mouse.y * 30 + 100 - camera.position.y) * 0.05;
            } else if(currentChapter === 3) {
                camera.lookAt(1000, 0, -2800);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
